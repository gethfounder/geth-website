            mvpState.dealData.counterparty = { company, country, years, info };
            
            try {
                const prompt = `Analyze this commodity trading counterparty for risk assessment:

Company: ${company}
Country: ${country}
Years in business: ${years}
Additional info: ${info}

Return ONLY a JSON object:
{
  "trust_score": <0-1000>,
  "risk_level": "<low|medium|high>",
  "risk_factors": ["factor1", "factor2", "factor3"],
  "positive_factors": ["factor1", "factor2"],
  "recommendation": "<approve|review|reject>",
  "confidence": <0-1>,
  "analysis_summary": "2-3 sentence summary"
}`;
                
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${OPENROUTER_API_KEY}`,
                        'Content-Type': 'application/json',
                        'HTTP-Referer': window.location.href,
                        'X-Title': 'GETH MVP Demo'
                    },
                    body: JSON.stringify({
                        model: 'meta-llama/llama-3.1-70b-instruct',
                        messages: [{ role: 'user', content: prompt }],
                        temperature: 0.3,
                        max_tokens: 600
                    })
                });
                
                const data = await response.json();
                const aiResponse = data.choices[0].message.content;
                
                const jsonMatch = aiResponse.match(/\{[\s\S]*\}/);
                if (!jsonMatch) throw new Error('Invalid AI response');
                
                const parsed = JSON.parse(jsonMatch[0]);
