<html lang="en">
<head>

    <title>GETH Hub — AI Platform for OTC Commodity Trade | Pre-seed</title>

    <meta name="keywords" content="commodity trading, OTC, AI, blockchain, UAE, VARA, pre-seed, energy, fuel oil">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --black: #000000; --white: #FFFFFF; --teal: #00C4B4;
            --teal-light: #00D4C4; --gray-light: #F5F5F5;
            --gray-dark: #1a1a1a; --gray-text: #666666;
        }
        body {
            font-family: 'Inter', Arial, sans-serif;
            line-height: 1.6; color: var(--black);
            overflow-x: hidden;
        }
        
        /* Disclaimer Banner */
        .disclaimer-banner {
            background: var(--gray-dark);
            color: var(--white);
            text-align: center;
            padding: 0.75rem 1rem;
            font-size: 0.85rem;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 2000;
            border-bottom: 2px solid var(--teal);
        }
        .disclaimer-banner a { color: var(--teal); text-decoration: none; font-weight: 600; }
        
        /* Navigation */
        nav {
            position: fixed; top: 42px; width: 100%;
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(10px);
            z-index: 1000; padding: 1.25rem 5%;
            box-shadow: 0 2px 20px rgba(0,0,0,0.08);
        }
        .nav-container {
            max-width: 1400px; margin: 0 auto;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo {
            display: flex; align-items: center; gap: 12px;
            font-weight: 700; font-size: 1.5rem;
            color: var(--black); text-decoration: none;
        }
        .logo svg { width: 45px; height: 45px; }
        .nav-links { display: flex; gap: 2rem; align-items: center; }
        .nav-links a {
            color: var(--black); text-decoration: none;
            font-weight: 500; transition: color 0.3s; font-size: 0.95rem;
        }
        .nav-links a:hover { color: var(--teal); }
        .btn {
            padding: 0.75rem 1.75rem; border-radius: 8px;
            text-decoration: none; font-weight: 600;
            transition: all 0.3s; display: inline-block;
            border: 2px solid transparent; cursor: pointer; font-size: 0.95rem;
        }
        .btn-primary { background: var(--teal); color: var(--white); }
        .btn-primary:hover {
            background: var(--teal-light);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0,196,180,0.3);
        }
        .btn-secondary {
            background: transparent; color: var(--teal);
            border: 2px solid var(--teal);
        }
        .btn-secondary:hover {
            background: var(--teal); color: var(--white);
        }
        
        /* Hero Section */
        .hero {
            margin-top: 140px; padding: 6rem 5%;
            background: linear-gradient(135deg, var(--black) 0%, var(--gray-dark) 100%);
            color: var(--white); position: relative; overflow: hidden;
        }
        .hero::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%2300C4B4' fill-opacity='0.08'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        .hero-content {
            position: relative; z-index: 1;
            max-width: 1100px; margin: 0 auto;
        }
        .hero-badge {
            display: inline-flex; align-items: center; gap: 0.5rem;
            background: rgba(0,196,180,0.15);
            border: 2px solid var(--teal);
            color: var(--teal); padding: 0.6rem 1.25rem;
            border-radius: 25px; font-size: 0.85rem;
            font-weight: 600; margin-bottom: 2rem;
        }
        .hero h1 {
            font-size: 3.25rem; font-weight: 700;
            margin-bottom: 1.25rem; line-height: 1.2;
        }
        .hero-subtitle {
            font-size: 1.75rem; color: var(--teal);
            margin-bottom: 1.5rem; font-weight: 500;
        }
        .hero-description {
            font-size: 1.15rem; margin-bottom: 1.25rem;
            opacity: 0.95; line-height: 1.7;
            max-width: 850px;
        }
        .hero-tagline {
            font-size: 1rem; opacity: 0.85;
            margin-bottom: 2.5rem; font-style: italic;
        }
        .hero-buttons { display: flex; gap: 1rem; flex-wrap: wrap; }
        
        /* About Section */
        .about { padding: 5rem 5%; background: var(--white); }
        .about-content {
            max-width: 1100px; margin: 0 auto;
            text-align: center;
        }
        .about-content h2 {
            font-size: 2.5rem; margin-bottom: 1.75rem;
            color: var(--black);
        }
        .about-content > p {
            font-size: 1.15rem; line-height: 1.8;
            margin-bottom: 1.75rem; color: var(--gray-text);
            max-width: 900px; margin-left: auto; margin-right: auto;
        }
        .about-stats {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 1.75rem; margin-top: 3rem;
        }
        .stat-item {
            text-align: center; padding: 2rem 1.5rem;
            background: var(--gray-light);
            border-radius: 10px;
            border-left: 4px solid var(--teal);
        }
        .stat-number {
            font-size: 2.25rem; font-weight: 700;
            color: var(--teal); display: block;
        }
        .stat-label {
            font-size: 0.95rem; color: var(--gray-text);
            margin-top: 0.5rem;
        }
        
        /* Sections Common */
        section { padding: 5rem 5%; }
        .container { max-width: 1100px; margin: 0 auto; }
        .section-title {
            font-size: 2.25rem; font-weight: 700;
            text-align: center; margin-bottom: 1rem;
        }
        .section-subtitle {
            text-align: center; color: var(--gray-text);
            margin-bottom: 3rem; font-size: 1.1rem;
            max-width: 700px; margin-left: auto; margin-right: auto;
        }
        .section-title::after {
            content: ''; display: block;
            width: 60px; height: 4px;
            background: var(--teal);
            margin: 1rem auto 0; border-radius: 2px;
        }
        
        /* Problem Section */
        .problem { background: var(--gray-light); }
        .problem-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 2rem; margin-top: 2.5rem;
        }
        .problem-card {
            text-align: center; padding: 2.25rem 1.75rem;
            background: var(--white); border-radius: 10px;
            transition: transform 0.3s;
            box-shadow: 0 3px 10px rgba(0,0,0,0.06);
        }
        .problem-card:hover { transform: translateY(-4px); }
        .problem-icon { font-size: 2.75rem; margin-bottom: 1rem; }
        .problem-card h3 {
            color: var(--teal); margin-bottom: 0.75rem;
            font-size: 1.35rem;
        }
        
        /* Solution Section */
        .solution { background: var(--white); }
        .solution-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 2.5rem; margin-top: 2.5rem;
        }
        .solution-card {
            background: var(--white); padding: 2.25rem;
            border-radius: 10px; border: 2px solid var(--gray-light);
            border-top: 4px solid var(--teal);
            box-shadow: 0 4px 14px rgba(0,0,0,0.07);
        }
        .solution-card h3 {
            font-size: 1.65rem; margin-bottom: 1rem;
            color: var(--black);
        }
        .solution-card .status {
            display: inline-block; background: var(--teal);
            color: var(--white); padding: 0.35rem 0.9rem;
            border-radius: 18px; font-size: 0.85rem;
            font-weight: 600; margin-bottom: 1rem;
        }
        .solution-card ul { list-style: none; margin-top: 1rem; }
        .solution-card li {
            padding: 0.6rem 0; padding-left: 1.6rem;
            position: relative; border-bottom: 1px solid var(--gray-light);
        }
        .solution-card li:last-child { border-bottom: none; }
        .solution-card li::before {
            content: '✓'; position: absolute; left: 0;
            color: var(--teal); font-weight: bold;
        }
        
        /* Use Case Section */
        .use-case { background: var(--gray-light); }
        .deal-overview {
            background: var(--white); padding: 2rem;
            border-radius: 10px; margin-bottom: 2.5rem;
            border-left: 4px solid var(--teal);
        }
        .deal-meta {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
            gap: 1.25rem; margin: 1.5rem 0;
        }
        .deal-meta-item {
            padding: 1rem; background: var(--gray-light);
            border-radius: 6px;
        }
        .deal-meta-label {
            font-size: 0.85rem; color: var(--gray-text);
            margin-bottom: 0.4rem; font-weight: 600;
        }
        .deal-meta-value {
            font-weight: 600; color: var(--teal);
            font-size: 1.05rem;
        }
        .participants {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem; margin: 1.5rem 0;
        }
        .participant-card {
            background: var(--gray-light); padding: 1.5rem;
            border-radius: 8px; border-top: 3px solid var(--teal);
        }
        .participant-role {
            font-weight: 700; color: var(--teal);
            margin-bottom: 0.5rem; font-size: 1.05rem;
        }
        .use-case-timeline {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
            gap: 2rem; margin-top: 2.5rem;
        }
        .use-case-step {
            background: var(--white); padding: 2.25rem 1.75rem;
            border-radius: 10px; position: relative;
            box-shadow: 0 4px 14px rgba(0,0,0,0.07);
        }
        .step-number {
            width: 48px; height: 48px;
            background: var(--teal); color: var(--white);
            border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            font-size: 1.4rem; font-weight: 700;
            margin-bottom: 1.25rem;
        }
        .use-case-step h3 {
            margin-bottom: 0.9rem; color: var(--black);
            font-size: 1.25rem;
        }
        .step-benefit {
            margin-top: 1rem; padding-top: 1rem;
            border-top: 1px solid var(--gray-light);
            font-size: 0.9rem; color: var(--teal);
            font-weight: 600;
        }
        
        /* Tokens Section */
        .tokens { background: var(--black); color: var(--white); }
        .tokens .section-title { color: var(--white); }
        .tokens-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
            gap: 2rem; margin-top: 2.5rem;
        }
        .token-card {
            background: var(--gray-dark); padding: 2.25rem;
            border-radius: 10px; border: 2px solid var(--teal);
            text-align: center;
        }
        .token-card h3 {
            font-size: 2rem; color: var(--teal);
            margin-bottom: 0.5rem;
        }
        .token-card .token-type {
            color: var(--white); opacity: 0.9;
            margin-bottom: 1.25rem; font-weight: 500;
        }
        .token-card ul {
            list-style: none; text-align: left;
            margin: 1.25rem 0;
        }
        .token-card li {
            padding: 0.65rem 0; padding-left: 1.6rem;
            position: relative; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .token-card li:last-child { border-bottom: none; }
        .token-card li::before {
            content: '→'; position: absolute; left: 0;
            color: var(--teal); font-weight: bold;
        }
        
        /* UAE Section */
        .uae { background: var(--white); }
        .uae-list { max-width: 850px; margin: 2.5rem auto 0; }
        .uae-item {
            display: flex; align-items: flex-start; gap: 1.25rem;
            padding: 1.75rem; background: var(--gray-light);
            margin-bottom: 1rem; border-radius: 10px;
            border-left: 4px solid var(--teal);
        }
        .uae-check {
            color: var(--teal); font-size: 1.5rem;
            font-weight: bold; flex-shrink: 0;
        }
        .uae-item h3 {
            margin-bottom: 0.4rem; color: var(--black);
            font-size: 1.15rem;
        }
        
        /* Team Section */
        .team { background: var(--gray-light); }
        .team-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2.5rem; margin-top: 2.5rem;
        }
        .team-card {
            background: var(--white); text-align: center;
            padding: 2.25rem; border-radius: 10px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.07);
        }
        .team-avatar {
            width: 110px; height: 110px;
            background: linear-gradient(135deg, var(--teal), var(--teal-light));
            border-radius: 50%; margin: 0 auto 1.25rem;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.75rem; color: var(--white);
        }
        .team-card h3 { font-size: 1.45rem; margin-bottom: 0.4rem; }
        .team-role {
            color: var(--teal); font-weight: 600;
            margin-bottom: 1rem; font-size: 1rem;
        }
        
        /* Roadmap Section */
        .roadmap { background: var(--black); color: var(--white); }
        .roadmap .section-title { color: var(--white); }
        .roadmap-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 2rem; margin: 2.5rem 0;
        }
        .roadmap-item {
            background: var(--gray-dark); padding: 1.75rem;
            border-radius: 10px; border-top: 4px solid var(--teal);
        }
        .roadmap-item h3 {
            color: var(--teal); margin-bottom: 0.9rem;
            font-size: 1.35rem;
        }
        .roadmap-item ul { list-style: none; }
        .roadmap-item li {
            padding: 0.45rem 0; padding-left: 1.4rem;
            position: relative;
        }
        .roadmap-item li::before {
            content: '•'; color: var(--teal);
            position: absolute; left: 0; font-weight: bold;
        }
        .funds-chart {
            margin-top: 2.5rem; background: var(--gray-dark);
            padding: 2rem; border-radius: 10px;
        }
